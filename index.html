<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>分期追蹤工具</title>
<style>
  :root{
    --surface-2:#ffffff; --surface-1:#f4f3ef; --surface-0:#eceae3;
    --text-primary:#1a1a18; --text-secondary:#5f5e5a; --text-muted:#888780;
    --border:rgba(0,0,0,0.12); --border-strong:rgba(0,0,0,0.28);
    --radius:8px;
    --blue-bg:#E6F1FB; --blue-text:#0C447C;
    --coral-bg:#FAECE7; --coral-text:#712B13;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --surface-2:#2c2c2a; --surface-1:#252523; --surface-0:#1c1c1b;
      --text-primary:#f1efe8; --text-secondary:#b4b2a9; --text-muted:#888780;
      --border:rgba(255,255,255,0.14); --border-strong:rgba(255,255,255,0.3);
      --blue-bg:#0C447C; --blue-text:#B5D4F4;
      --coral-bg:#712B13; --coral-text:#F5C4B3;
    }
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:24px 16px 60px; background:var(--surface-0); color:var(--text-primary);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    font-size:16px; line-height:1.6;
  }
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:20px;font-weight:500;margin:0 0 4px}
  a{color:var(--text-accent,#185fa5)}
  .nav-link{display:inline-block;font-size:13px;color:var(--text-secondary);text-decoration:none;border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:6px 12px;margin-bottom:16px}
  .nav-link:hover{background:var(--surface-1)}
  button{
    font-family:inherit; font-size:14px; padding:8px 14px; border-radius:var(--radius);
    border:0.5px solid var(--border-strong); background:transparent; color:var(--text-primary);
    cursor:pointer;
  }
  button:hover{background:var(--surface-1)}
  button:active{transform:scale(0.98)}
  input,select{
    font-family:inherit; font-size:14px; padding:8px 10px; border-radius:var(--radius);
    border:0.5px solid var(--border); background:var(--surface-1); color:var(--text-primary);
    height:36px;
  }
  input:focus,select:focus{outline:none;box-shadow:0 0 0 2px var(--border-strong)}
  label{font-size:13px;color:var(--text-secondary);display:block;margin-bottom:3px}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin:8px 0 14px;flex-wrap:wrap;gap:8px}
  .tabs button{font-weight:400}
  .tabs button.active{font-weight:500}
  .grid-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:12px}
  .card{background:var(--surface-1);border-radius:var(--radius);padding:1rem}
  .card .label{font-size:13px;color:var(--text-secondary);margin:0 0 4px}
  .card .value{font-size:24px;font-weight:500;margin:0}
  .bank-card{border-radius:var(--radius);padding:1rem}
  .bank-card.T{background:var(--blue-bg);color:var(--blue-text)}
  .bank-card.Z{background:var(--coral-bg);color:var(--coral-text)}
  .bank-card p{margin:2px 0}
  .item-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:10px}
  .item-card.done{opacity:0.55}
  .badge{font-size:11px;padding:2px 8px;border-radius:var(--radius);font-weight:500;margin-right:8px}
  .badge.T{background:var(--blue-bg);color:var(--blue-text)}
  .badge.Z{background:var(--coral-bg);color:var(--coral-text)}
  .row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .name{font-weight:500;font-size:15px;margin:0;display:inline}
  .meta{font-size:13px;color:var(--text-secondary);margin:4px 0 0}
  .actions{display:flex;gap:6px;flex-shrink:0}
  .actions button{padding:4px 8px}
  .progress-wrap{margin-top:10px}
  .progress-line{display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:4px}
  .progress-bg{height:6px;background:var(--surface-1);border-radius:4px;overflow:hidden}
  .progress-fg{height:100%;background:var(--border-strong)}
  table{border-collapse:collapse;font-size:12px;min-width:600px;width:100%}
  th,td{padding:6px 8px;border-bottom:0.5px solid var(--border);text-align:center;white-space:nowrap}
  th{color:var(--text-secondary);font-weight:500}
  td:first-child,th:first-child{text-align:left;position:sticky;left:0;background:var(--surface-2)}
  .table-wrap{overflow-x:auto;background:var(--surface-2);border-radius:12px;border:0.5px solid var(--border);padding:4px}
  .empty{color:var(--text-muted);font-size:14px;text-align:center;padding:2rem 0}
  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45);
    align-items:center; justify-content:center; z-index:10; padding:16px;
  }
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface-2);border-radius:12px;border:0.5px solid var(--border);padding:20px;width:340px;max-width:100%}
  .modal h2{font-size:16px;font-weight:500;margin:0 0 12px}
  .field-row{display:flex;gap:8px}
  .field{flex:1;margin-bottom:10px}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
  .footnote{font-size:12px;color:var(--text-muted);margin-top:10px}
  .confirm-overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45);
    align-items:center; justify-content:center; z-index:20; padding:16px;
  }
  .confirm-overlay.open{display:flex}
  .confirm-box{background:var(--surface-2);border-radius:12px;border:0.5px solid var(--border);padding:20px;width:300px;max-width:100%;text-align:center}
  .confirm-box p{font-size:14px;margin:0 0 16px}
  .confirm-box .row{display:flex;gap:8px;justify-content:center}
  .confirm-box .row button{flex:1}
  .confirm-box .danger{background:#c0392b;color:#fff;border-color:#c0392b}
  @media (max-width:480px){
    body{padding:16px 12px 50px;font-size:15px}
    h1{font-size:18px}
    .topbar{margin:8px 0 12px}
    button{padding:9px 12px;font-size:13px}
    .item-card{padding:12px 14px}
    .name{font-size:14px}
    .meta{font-size:12px}
    .card .value{font-size:20px}
    .modal{width:100%}
  }
  #lock-screen{
    position:fixed; inset:0; background:var(--surface-0); display:flex; align-items:center;
    justify-content:center; z-index:100; padding:20px;
  }
  #lock-screen .box{width:280px; max-width:100%; text-align:center}
  #lock-screen p.title{font-size:16px;font-weight:500;margin:0 0 16px}
  #lock-screen input{width:100%; text-align:center; letter-spacing:4px; margin-bottom:10px}
  #lock-screen button{width:100%; font-weight:500}
  #lock-screen .err{font-size:12px;color:#c0392b;min-height:16px;margin:6px 0 4px}
  #app-content{display:none}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div id="lock-screen">
  <div class="box">
    <p class="title">請輸入密碼</p>
    <input id="lock-input" type="password" inputmode="numeric" maxlength="12" placeholder="••••••" />
    <p class="err" id="lock-err"></p>
    <button id="lock-btn">解鎖</button>
  </div>
</div>

<div id="app-content">
<div class="wrap">
  <h1>📝分期追蹤工具</h1>
  <a class="nav-link" href="rent.html">前往房租記錄 →</a>
  <a class="nav-link" style="margin-left:8px" href="savings.html">前往存錢記錄 →</a>

  <div class="topbar">
    <div class="tabs">
      <button id="tab-list" class="active">清單檢視</button>
      <button id="tab-grid">月份總覽</button>
    </div>
    <button id="btn-add">＋ 新增分期</button>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
    <button id="btn-google-signin" style="flex:1;font-size:13px;min-width:120px">登入 Google</button>
    <button id="btn-google-upload" style="flex:1;font-size:13px;min-width:120px;display:none">同步到雲端</button>
    <button id="btn-google-download" style="flex:1;font-size:13px;min-width:120px;display:none">從雲端讀取</button>
  </div>
  <p id="google-status" style="font-size:12px;color:var(--text-muted);margin:0 0 16px">尚未登入 Google，目前資料僅存於此瀏覽器。</p>

  <div style="display:flex;gap:8px;margin-bottom:16px">
    <button id="btn-export" style="flex:1;font-size:13px">匯出備份</button>
    <button id="btn-import" style="flex:1;font-size:13px">匯入備份</button>
    <input type="file" id="import-file" accept="application/json" style="display:none" />
  </div>

  <div class="grid-summary" id="summary"></div>
  <div class="grid-summary" id="bank-summary" style="margin-bottom:24px"></div>

  <div id="view-list"></div>
  <div id="view-grid" style="display:none"></div>
</div>

<div class="modal-overlay" id="modal-wrap">
  <div class="modal">
    <h2 id="modal-title">新增分期項目</h2>
    <div class="field">
      <label>銀行</label>
      <select id="f-bank" style="width:100%">
        <option value="T">T 台新銀行</option>
        <option value="Z">Z 中信銀行</option>
      </select>
    </div>
    <div class="field">
      <label>項目名稱（選填）</label>
      <input id="f-name" placeholder="例如：iPhone 分期" style="width:100%" />
    </div>
    <div class="field-row">
      <div class="field">
        <label>總期數 <span style="color:#c0392b">*</span></label>
        <input id="f-total" type="number" min="1" step="1" placeholder="12" style="width:100%" />
      </div>
      <div class="field" id="f-amount-wrap">
        <label>每期金額 <span style="color:#c0392b">*</span></label>
        <input id="f-amount" type="number" min="0" step="1" placeholder="2600" style="width:100%" />
      </div>
    </div>
    <div class="field" style="display:flex;align-items:center;gap:8px">
      <input id="f-phase-toggle" type="checkbox" style="width:auto;height:auto" />
      <label style="margin:0;font-size:13px" for="f-phase-toggle">前後期金額不同（分階段）</label>
    </div>
    <div id="f-phase-wrap" style="display:none">
      <div class="field-row">
        <div class="field">
          <label>前幾期</label>
          <input id="f-phase1-count" type="number" min="1" step="1" placeholder="3" style="width:100%" />
        </div>
        <div class="field">
          <label>前期每期金額</label>
          <input id="f-phase1-amount" type="number" min="0" step="1" placeholder="2000" style="width:100%" />
        </div>
      </div>
      <div class="field">
        <label>剩餘期數每期金額</label>
        <input id="f-phase2-amount" type="number" min="0" step="1" placeholder="1800" style="width:100%" />
      </div>
    </div>
    <div class="field">
      <label>起始月份（選填，預設為本月）</label>
      <input id="f-start" type="month" style="width:100%" />
    </div>
    <div class="field">
      <label>備註（選填）</label>
      <input id="f-note" placeholder="備註" style="width:100%" />
    </div>
    <div class="modal-actions">
      <button id="btn-cancel">取消</button>
      <button id="btn-save" style="font-weight:500">儲存</button>
    </div>
  </div>
</div>
</div>

<div class="confirm-overlay" id="confirm-wrap">
  <div class="confirm-box">
    <p>確定要刪除這筆分期紀錄嗎？此動作無法復原。</p>
    <div class="row">
      <button id="confirm-cancel">取消</button>
      <button id="confirm-ok" class="danger">刪除</button>
    </div>
  </div>
</div>

<script>
(function(){
  var STORE_KEY = 'installment_plans_v1';
  var plans = [];
  var editingId = null;

  function uid(){ return 'p'+Date.now()+Math.floor(Math.random()*1000); }
  function addMonths(y,m,n){
    var total=(y*12+(m-1))+n;
    return {y:Math.floor(total/12), m:(total%12)+1};
  }
  function fmtMoney(n){ return 'NT$'+Math.round(n).toLocaleString(); }
  function currentYM(){ var d=new Date(); return {y:d.getFullYear(), m:d.getMonth()+1}; }

  function planSchedule(p){
    var s=p.start.split('-'); var sy=parseInt(s[0],10), sm=parseInt(s[1],10);
    var months=[];
    for(var i=0;i<p.total;i++){ var ym=addMonths(sy,sm,i); months.push({y:ym.y,m:ym.m,idx:i+1}); }
    return months;
  }
  function planAmountForIndex(p, idx){
    if(p.phases && p.phases.length){
      var acc=0;
      for(var i=0;i<p.phases.length;i++){
        acc += p.phases[i].count;
        if(idx<=acc) return p.phases[i].amount;
      }
      return p.phases[p.phases.length-1].amount;
    }
    return p.amount;
  }
  function planRemainingAmount(p){
    var paid=paidCount(p);
    var sum=0;
    for(var idx=paid+1; idx<=p.total; idx++){ sum += planAmountForIndex(p, idx); }
    return sum;
  }
  function paidCount(p){
    var cur=currentYM(); var sched=planSchedule(p); var count=0;
    sched.forEach(function(ms){ if(ms.y<cur.y || (ms.y===cur.y && ms.m<=cur.m)) count++; });
    return Math.min(count,p.total);
  }
  function amountThisMonth(p){
    var cur=currentYM(); var sched=planSchedule(p);
    var hit = sched.find(function(ms){ return ms.y===cur.y && ms.m===cur.m; });
    return hit ? planAmountForIndex(p, hit.idx) : 0;
  }
  function amountNextMonth(p){
    var cur=currentYM(); var nxt=addMonths(cur.y,cur.m,1); var sched=planSchedule(p);
    var hit = sched.find(function(ms){ return ms.y===nxt.y && ms.m===nxt.m; });
    return hit ? planAmountForIndex(p, hit.idx) : 0;
  }

  function load(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      plans = raw ? JSON.parse(raw) : [];
    }catch(e){ plans = []; }
    render();
  }
  function persist(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(plans)); }
    catch(e){ alert('儲存失敗：瀏覽器儲存空間可能已滿或被封鎖。'); }
    if(typeof scheduleAutoSync === 'function') scheduleAutoSync();
  }

  function openModal(plan){
    editingId = plan ? plan.id : null;
    document.getElementById('modal-title').textContent = plan ? '編輯分期項目' : '新增分期項目';
    document.getElementById('f-bank').value = plan ? plan.bank : 'T';
    document.getElementById('f-name').value = plan ? plan.name : '';
    document.getElementById('f-total').value = plan ? plan.total : '';
    document.getElementById('f-start').value = plan ? plan.start : '';
    document.getElementById('f-note').value = plan ? (plan.note||'') : '';
    var hasPhases = plan && plan.phases && plan.phases.length>1;
    document.getElementById('f-phase-toggle').checked = !!hasPhases;
    if(hasPhases){
      document.getElementById('f-phase1-count').value = plan.phases[0].count;
      document.getElementById('f-phase1-amount').value = plan.phases[0].amount;
      document.getElementById('f-phase2-amount').value = plan.phases[1].amount;
      document.getElementById('f-amount').value = '';
    } else {
      document.getElementById('f-amount').value = plan ? plan.amount : '';
      document.getElementById('f-phase1-count').value = '';
      document.getElementById('f-phase1-amount').value = '';
      document.getElementById('f-phase2-amount').value = '';
    }
    togglePhaseFields();
    document.getElementById('modal-wrap').classList.add('open');
  }
  function closeModal(){ document.getElementById('modal-wrap').classList.remove('open'); }
  function togglePhaseFields(){
    var on = document.getElementById('f-phase-toggle').checked;
    document.getElementById('f-phase-wrap').style.display = on ? 'block' : 'none';
    document.getElementById('f-amount-wrap').style.display = on ? 'none' : 'block';
  }
  document.getElementById('f-phase-toggle').addEventListener('change', togglePhaseFields);

  document.getElementById('btn-add').addEventListener('click', function(){ openModal(null); });
  document.getElementById('btn-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-wrap').addEventListener('click', function(e){
    if(e.target.id==='modal-wrap') closeModal();
  });

  document.getElementById('btn-save').addEventListener('click', function(){
    var bank=document.getElementById('f-bank').value;
    var name=document.getElementById('f-name').value.trim();
    var total=parseInt(document.getElementById('f-total').value,10);
    var start=document.getElementById('f-start').value;
    var note=document.getElementById('f-note').value.trim();
    var usePhases = document.getElementById('f-phase-toggle').checked;
    var amount, phases;

    if(!total || total<=0 || isNaN(total)){
      alert('請填寫總期數');
      return;
    }

    if(usePhases){
      var p1count = parseInt(document.getElementById('f-phase1-count').value,10);
      var p1amount = parseFloat(document.getElementById('f-phase1-amount').value);
      var p2amount = parseFloat(document.getElementById('f-phase2-amount').value);
      if(!p1count || p1count<=0 || p1count>=total || isNaN(p1count) || !p1amount || p1amount<=0 || isNaN(p1amount) || !p2amount || p2amount<=0 || isNaN(p2amount)){
        alert('請完整填寫分階段期數與金額（前幾期需小於總期數）');
        return;
      }
      phases = [
        {count: p1count, amount: p1amount},
        {count: total - p1count, amount: p2amount}
      ];
      amount = p1amount;
    } else {
      amount = parseFloat(document.getElementById('f-amount').value);
      if(!amount || amount<=0 || isNaN(amount)){
        alert('請填寫每期金額');
        return;
      }
      phases = null;
    }

    if(!name) name = '未命名項目';
    if(!start){
      var cur=currentYM();
      start = cur.y+'-'+String(cur.m).padStart(2,'0');
    }
    var plan;
    if(editingId){
      plan = plans.find(function(p){ return p.id===editingId; });
      plan.bank=bank; plan.name=name; plan.total=total; plan.amount=amount; plan.start=start; plan.note=note;
      if(phases) plan.phases = phases; else delete plan.phases;
    } else {
      plan = {id:uid(), bank:bank, name:name, total:total, amount:amount, start:start, note:note, created:Date.now()};
      if(phases) plan.phases = phases;
      plans.push(plan);
    }
    persist();
    closeModal();
    render();
  });

  function render(){
    renderSummary();
    renderBankSummary();
    renderList();
    renderGrid();
  }

  function renderSummary(){
    var totalRemaining=0, monthlyDue=0, nextMonthDue=0, activeCount=0;
    plans.forEach(function(p){
      var paid=paidCount(p); var remaining=Math.max(p.total-paid,0);
      totalRemaining += planRemainingAmount(p);
      if(remaining>0){
        activeCount++;
        monthlyDue += amountThisMonth(p);
        nextMonthDue += amountNextMonth(p);
      }
    });
    document.getElementById('summary').innerHTML =
      '<div class="card"><p class="label">本月應繳</p><p class="value">'+fmtMoney(monthlyDue)+'</p></div>'+
      '<div class="card"><p class="label">次月應繳</p><p class="value">'+fmtMoney(nextMonthDue)+'</p></div>'+
      '<div class="card"><p class="label">未繳總額</p><p class="value">'+fmtMoney(totalRemaining)+'</p></div>'+
      '<div class="card"><p class="label">進行中項目</p><p class="value">'+activeCount+'</p></div>';
  }

  function renderBankSummary(){
    var banks=['T','Z']; var stats={};
    banks.forEach(function(b){ stats[b]={monthly:0,nextMonthly:0,remaining:0,count:0}; });
    plans.forEach(function(p){
      var paid=paidCount(p); var remaining=Math.max(p.total-paid,0);
      if(remaining>0){
        stats[p.bank].remaining += planRemainingAmount(p);
        stats[p.bank].count += 1;
        stats[p.bank].monthly += amountThisMonth(p);
        stats[p.bank].nextMonthly += amountNextMonth(p);
      }
    });
    var html='';
    banks.forEach(function(b){
      html += '<div class="bank-card '+b+'">'+
        '<p style="font-weight:500">'+b+'　進行中 '+stats[b].count+' 項</p>'+
        '<p>本月應繳：<span style="font-size:18px;font-weight:500">'+fmtMoney(stats[b].monthly)+'</span></p>'+
        '<p>次月應繳：<span style="font-weight:500">'+fmtMoney(stats[b].nextMonthly)+'</span></p>'+
        '<p>未繳總額：<span style="font-weight:500">'+fmtMoney(stats[b].remaining)+'</span></p>'+
      '</div>';
    });
    document.getElementById('bank-summary').innerHTML = html;
  }

  function renderList(){
    var el=document.getElementById('view-list');
    if(plans.length===0){
      el.innerHTML='<p class="empty">尚未新增任何分期項目，點右上角「新增分期」開始記錄。</p>';
      return;
    }
    var sorted=plans.slice().sort(function(a,b){
      var ra=Math.max(a.total-paidCount(a),0), rb=Math.max(b.total-paidCount(b),0);
      if((ra>0)!==(rb>0)) return ra>0?-1:1;
      return a.start<b.start?-1:1;
    });
    var html='';
    sorted.forEach(function(p){
      var paid=paidCount(p); var remaining=Math.max(p.total-paid,0);
      var pct=Math.min(100,Math.round((paid/p.total)*100));
      var done=remaining===0;
      var amountLabel = (p.phases && p.phases.length>1)
        ? '前'+p.phases[0].count+'期 '+fmtMoney(p.phases[0].amount)+'／後'+p.phases[1].count+'期 '+fmtMoney(p.phases[1].amount)
        : '每期 '+fmtMoney(p.amount);
      html += '<div class="item-card'+(done?' done':'')+'">'+
        '<div class="row-top">'+
          '<div>'+
            '<span class="badge '+p.bank+'">'+p.bank+'</span>'+
            '<p class="name">'+escapeHtml(p.name)+'</p>'+
            '<p class="meta">'+amountLabel+'　起始 '+p.start+(p.note?'　'+escapeHtml(p.note):'')+'</p>'+
          '</div>'+
          '<div class="actions">'+
            '<button data-edit="'+p.id+'">編輯</button>'+
            '<button data-del="'+p.id+'">刪除</button>'+
          '</div>'+
        '</div>'+
        '<div class="progress-wrap">'+
          '<div class="progress-line"><span>'+(done?'已繳清':'已繳 '+paid+' / '+p.total+' 期')+'</span><span>'+(done?'':'剩 '+fmtMoney(planRemainingAmount(p)))+'</span></div>'+
          '<div class="progress-bg"><div class="progress-fg" style="width:'+pct+'%"></div></div>'+
        '</div>'+
      '</div>';
    });
    el.innerHTML = html;

    el.querySelectorAll('[data-edit]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var p = plans.find(function(x){ return x.id===btn.getAttribute('data-edit'); });
        openModal(p);
      });
    });
    el.querySelectorAll('[data-del]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-del');
        askDeleteConfirm(id);
      });
    });
  }

  var pendingDeleteId = null;
  function askDeleteConfirm(id){
    pendingDeleteId = id;
    document.getElementById('confirm-wrap').classList.add('open');
  }
  document.getElementById('confirm-cancel').addEventListener('click', function(){
    pendingDeleteId = null;
    document.getElementById('confirm-wrap').classList.remove('open');
  });
  document.getElementById('confirm-wrap').addEventListener('click', function(e){
    if(e.target.id==='confirm-wrap'){
      pendingDeleteId = null;
      this.classList.remove('open');
    }
  });
  document.getElementById('confirm-ok').addEventListener('click', function(){
    if(pendingDeleteId){
      plans = plans.filter(function(p){ return p.id!==pendingDeleteId; });
      persist();
      render();
    }
    pendingDeleteId = null;
    document.getElementById('confirm-wrap').classList.remove('open');
  });

  function renderGrid(){
    var el=document.getElementById('view-grid');
    if(plans.length===0){
      el.innerHTML='<p class="empty">尚無資料</p>';
      return;
    }
    var cur=currentYM();
    var monthsList=[];
    for(var i=-1;i<11;i++){ monthsList.push(addMonths(cur.y,cur.m,i)); }

    var html='<div class="table-wrap"><table><tr><th>項目</th>';
    monthsList.forEach(function(ym){
      var isCur = ym.y===cur.y && ym.m===cur.m;
      html += '<th style="'+(isCur?'color:var(--text-primary);font-weight:700':'')+'">'+ym.m+'月</th>';
    });
    html += '</tr>';

    plans.forEach(function(p){
      var sched=planSchedule(p);
      html += '<tr><td><span class="badge '+p.bank+'" style="margin-right:6px">'+p.bank+'</span>'+escapeHtml(p.name)+'</td>';
      monthsList.forEach(function(ym){
        var hit = sched.find(function(ms){ return ms.y===ym.y && ms.m===ym.m; });
        var isPast = (ym.y<cur.y || (ym.y===cur.y && ym.m<=cur.m));
        var cell='';
        if(hit){
          cell='<span style="'+(isPast?'color:var(--text-muted);text-decoration:line-through;':'font-weight:500')+'">'+hit.idx+'</span>';
        }
        html += '<td>'+cell+'</td>';
      });
      html += '</tr>';
    });

    html += '<tr><td style="font-weight:500">每月小計</td>';
    monthsList.forEach(function(ym){
      var sum=0;
      plans.forEach(function(p){
        var sched=planSchedule(p);
        var hit = sched.find(function(ms){ return ms.y===ym.y && ms.m===ym.m; });
        if(hit) sum += planAmountForIndex(p, hit.idx);
      });
      html += '<td style="font-weight:500">'+(sum?fmtMoney(sum):'')+'</td>';
    });
    html += '</tr></table></div>';
    html += '<p class="footnote">數字代表該月為第幾期，劃線表示已過該月，最下方為兩家銀行合計小計金額。</p>';
    el.innerHTML = html;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  document.getElementById('tab-list').addEventListener('click', function(){
    document.getElementById('view-list').style.display='block';
    document.getElementById('view-grid').style.display='none';
    this.classList.add('active');
    document.getElementById('tab-grid').classList.remove('active');
  });
  document.getElementById('tab-grid').addEventListener('click', function(){
    document.getElementById('view-list').style.display='none';
    document.getElementById('view-grid').style.display='block';
    this.classList.add('active');
    document.getElementById('tab-list').classList.remove('active');
  });

  // ---- Google Drive 同步 (appDataFolder)，與房租頁面共用同一個雲端檔案，互相保留對方資料 ----
  var GOOGLE_CLIENT_ID = '318579246047-ahdsc8epir18m3p42krh7tqddrrcbs64.apps.googleusercontent.com';
  var DRIVE_FILE_NAME = 'tracker_data.json';
  var driveAccessToken = null;
  var driveFileId = null;
  var tokenClient = null;

  function setGoogleStatus(text){
    document.getElementById('google-status').textContent = text;
  }

  function initGoogleAuth(){
    if(typeof google === 'undefined' || !google.accounts){
      setGoogleStatus('Google 登入元件載入失敗，請檢查網路連線後重新整理。');
      return;
    }
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive.appdata',
      callback: function(resp){
        if(resp.error){
          setGoogleStatus('登入失敗：'+resp.error);
          return;
        }
        driveAccessToken = resp.access_token;
        document.getElementById('btn-google-signin').textContent = '已登入 Google';
        document.getElementById('btn-google-upload').style.display = 'block';
        document.getElementById('btn-google-download').style.display = 'block';
        setGoogleStatus('已登入，新增或修改資料後會自動同步到雲端。');
        scheduleAutoSync();
      }
    });
  }

  document.getElementById('btn-google-signin').addEventListener('click', function(){
    if(!tokenClient){ initGoogleAuth(); }
    if(tokenClient){
      tokenClient.requestAccessToken({prompt: driveAccessToken ? '' : 'consent'});
    }
  });

  function driveFetch(url, options){
    options = options || {};
    options.headers = options.headers || {};
    options.headers['Authorization'] = 'Bearer ' + driveAccessToken;
    return fetch(url, options);
  }

  async function findDriveFile(){
    var url = 'https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=' +
      encodeURIComponent("name='"+DRIVE_FILE_NAME+"'") + '&fields=files(id,name)';
    var res = await driveFetch(url);
    var data = await res.json();
    if(data.files && data.files.length>0){
      driveFileId = data.files[0].id;
      return driveFileId;
    }
    return null;
  }

  async function fetchRemoteData(id){
    try{
      var res = await driveFetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media');
      if(!res.ok) return {plans:[], rent:[]};
      var data = await res.json();
      if(Array.isArray(data)) return {plans: data, rent: []};
      return {plans: Array.isArray(data.plans)?data.plans:[], rent: Array.isArray(data.rent)?data.rent:[]};
    }catch(e){ return {plans:[], rent:[]}; }
  }

  async function uploadToDrive(silent){
    if(!driveAccessToken) return false;
    if(!silent) setGoogleStatus('同步中…');
    try{
      var id = driveFileId || await findDriveFile();
      var remote = id ? await fetchRemoteData(id) : {plans:[], rent:[]};
      var payload = {plans: plans, rent: remote.rent};
      var metadata = {name: DRIVE_FILE_NAME, mimeType: 'application/json'};
      if(!id) metadata.parents = ['appDataFolder'];
      var boundary = 'boundary_'+Date.now();
      var body =
        '--'+boundary+'\r\n'+
        'Content-Type: application/json; charset=UTF-8\r\n\r\n'+
        JSON.stringify(metadata)+'\r\n'+
        '--'+boundary+'\r\n'+
        'Content-Type: application/json\r\n\r\n'+
        JSON.stringify(payload)+'\r\n'+
        '--'+boundary+'--';
      var url = id
        ? 'https://www.googleapis.com/upload/drive/v3/files/'+id+'?uploadType=multipart'
        : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
      var res = await driveFetch(url, {
        method: id ? 'PATCH' : 'POST',
        headers: {'Content-Type': 'multipart/related; boundary='+boundary},
        body: body
      });
      if(!res.ok) throw new Error('upload failed');
      var data = await res.json();
      driveFileId = data.id;
      setGoogleStatus('已自動同步到雲端（'+new Date().toLocaleString('zh-TW')+'）');
      return true;
    }catch(e){
      setGoogleStatus('自動同步失敗，請稍後用「同步到雲端」按鈕再試一次。');
      return false;
    }
  }

  var autoSyncTimer = null;
  function scheduleAutoSync(){
    if(!driveAccessToken) return;
    if(autoSyncTimer) clearTimeout(autoSyncTimer);
    autoSyncTimer = setTimeout(function(){ uploadToDrive(true); }, 800);
  }

  document.getElementById('btn-google-upload').addEventListener('click', async function(){
    if(!driveAccessToken){ setGoogleStatus('請先登入 Google'); return; }
    await uploadToDrive(false);
  });

  document.getElementById('btn-google-download').addEventListener('click', async function(){
    if(!driveAccessToken){ setGoogleStatus('請先登入 Google'); return; }
    setGoogleStatus('讀取中…');
    try{
      var id = driveFileId || await findDriveFile();
      if(!id){
        setGoogleStatus('雲端尚無備份資料，請先按「同步到雲端」建立一份。');
        return;
      }
      var remote = await fetchRemoteData(id);
      if(plans.length>0 && !confirm('從雲端讀取將會「取代」目前畫面上的分期資料，確定要繼續嗎？')) return;
      plans = remote.plans;
      persist();
      render();
      setGoogleStatus('已從雲端讀取最新資料。');
    }catch(e){
      setGoogleStatus('讀取失敗，請再試一次。');
    }
  });

  window.addEventListener('load', function(){
    setTimeout(initGoogleAuth, 300);
  });

  document.getElementById('btn-export').addEventListener('click', function(){
    var blob = new Blob([JSON.stringify(plans, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var d = new Date();
    var stamp = d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
    a.href = url;
    a.download = '分期備份_'+stamp+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById('btn-import').addEventListener('click', function(){
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file').addEventListener('change', function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(evt){
      try{
        var data = JSON.parse(evt.target.result);
        if(!Array.isArray(data)) throw new Error('format');
        if(plans.length>0 && !confirm('匯入將會「取代」目前所有分期紀錄，確定要繼續嗎？')) return;
        plans = data;
        persist();
        render();
        alert('匯入完成');
      }catch(err){
        alert('匯入失敗，檔案格式不正確');
      }
      document.getElementById('import-file').value = '';
    };
    reader.readAsText(file);
  });

  load();
})();

  var lockScreen = document.getElementById('lock-screen');
  var appContent = document.getElementById('app-content');
  var input = document.getElementById('lock-input');
  var err = document.getElementById('lock-err');
  var btn = document.getElementById('lock-btn');

  function tryUnlock(){
    if(input.value === PASSWORD){
      lockScreen.style.display = 'none';
      appContent.style.display = 'block';
    } else {
      err.textContent = '密碼錯誤，請再試一次';
      input.value = '';
      input.focus();
    }
  }
  btn.addEventListener('click', tryUnlock);
  input.addEventListener('keydown', function(e){
    if(e.key === 'Enter') tryUnlock();
  });
  setTimeout(function(){ input.focus(); }, 100);
})();

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>存錢記錄</title>
<style>
  :root{
    --surface-2:#ffffff;--surface-1:#f4f3ef;--surface-0:#eceae3;
    --text-primary:#1a1a18;--text-secondary:#5f5e5a;--text-muted:#888780;
    --border:rgba(0,0,0,0.12);--border-strong:rgba(0,0,0,0.28);
    --radius:8px;
    --accent:#2563EB;--accent-light:#EFF6FF;
    --green:#1d9e75;--green-bg:#E3F5EC;
    --red:#c0392b;--red-bg:#FEF2F2;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --surface-2:#2c2c2a;--surface-1:#252523;--surface-0:#1c1c1b;
      --text-primary:#f1efe8;--text-secondary:#b4b2a9;--text-muted:#888780;
      --border:rgba(255,255,255,0.14);--border-strong:rgba(255,255,255,0.3);
      --accent-light:#1e3a8a;--green-bg:#1d6b3e;--red-bg:#7f1d1d;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--surface-0);color:var(--text-primary);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:16px;line-height:1.6;padding:24px 16px 80px;
  }
  .wrap{max-width:780px;margin:0 auto}
  h1{font-size:20px;font-weight:500;margin-bottom:4px}
  h2{font-size:15px;font-weight:500;margin-bottom:12px;color:var(--text-secondary)}
  .nav-link{display:inline-block;font-size:13px;color:var(--text-secondary);text-decoration:none;border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:6px 12px;margin-bottom:20px}
  .nav-link:hover{background:var(--surface-1)}
  button{
    font-family:inherit;font-size:14px;padding:8px 14px;border-radius:var(--radius);
    border:0.5px solid var(--border-strong);background:transparent;color:var(--text-primary);cursor:pointer;
  }
  button:hover{background:var(--surface-1)}
  button:active{transform:scale(0.98)}
  input,select{
    font-family:inherit;font-size:14px;padding:8px 10px;border-radius:var(--radius);
    border:0.5px solid var(--border);background:var(--surface-1);color:var(--text-primary);height:36px;
  }
  input:focus,select:focus{outline:none;box-shadow:0 0 0 2px var(--border-strong)}
  label{font-size:13px;color:var(--text-secondary);display:block;margin-bottom:3px}
  .section{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
  .card{background:var(--surface-1);border-radius:var(--radius);padding:14px}
  .card .lbl{font-size:12px;color:var(--text-secondary);margin-bottom:2px}
  .card .val{font-size:22px;font-weight:500}
  .card .sub{font-size:12px;color:var(--text-muted);margin-top:2px}
  .card.highlight{background:var(--accent-light)}
  .card.green{background:var(--green-bg)}
  .card.red{background:var(--red-bg)}
  .progress-outer{height:14px;background:var(--surface-1);border-radius:999px;overflow:hidden;margin:8px 0 4px}
  .progress-inner{height:100%;border-radius:999px;background:var(--accent);transition:width .4s}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
  table{border-collapse:collapse;width:100%;font-size:13px}
  th,td{padding:9px 10px;border-bottom:0.5px solid var(--border)}
  th{color:var(--text-secondary);font-weight:500;text-align:left;background:var(--surface-1)}
  td:not(:first-child){text-align:right}
  tr:last-child td{border-bottom:none}
  .up{color:var(--red);font-weight:500}
  .down{color:var(--green);font-weight:500}
  .act-btn{padding:3px 10px;font-size:12px}
  .empty{color:var(--text-muted);font-size:14px;text-align:center;padding:2rem 0}
  canvas{display:block;width:100%!important;height:220px!important}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:10;padding:16px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface-2);border-radius:12px;border:0.5px solid var(--border);padding:20px;width:360px;max-width:100%}
  .modal h2{font-size:16px;font-weight:500;margin-bottom:14px;color:var(--text-primary)}
  .field{margin-bottom:10px}
  .field-row{display:flex;gap:8px}
  .field-row .field{flex:1}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
  .confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:20;padding:16px}
  .confirm-overlay.open{display:flex}
  .confirm-box{background:var(--surface-2);border-radius:12px;border:0.5px solid var(--border);padding:20px;width:300px;max-width:100%;text-align:center}
  .confirm-box p{font-size:14px;margin-bottom:16px}
  .confirm-box .row{display:flex;gap:8px;justify-content:center}
  .confirm-box .row button{flex:1}
  .danger{background:#c0392b!important;color:#fff!important;border-color:#c0392b!important}
  #lock-screen{position:fixed;inset:0;background:var(--surface-0);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  #lock-screen .box{width:280px;max-width:100%;text-align:center}
  #lock-screen p.title{font-size:16px;font-weight:500;margin-bottom:16px}
  #lock-screen input{width:100%;text-align:center;letter-spacing:4px;margin-bottom:10px}
  #lock-screen button{width:100%;font-weight:500}
  #lock-screen .err{font-size:12px;color:#c0392b;min-height:16px;margin:6px 0 4px}
  #app-content{display:none}
  @media(max-width:480px){
    body{padding:16px 12px 60px}
    h1{font-size:18px}
    .card .val{font-size:18px}
    .modal{width:100%}
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div id="lock-screen">
  <div class="box">
    <p class="title">請輸入密碼</p>
    <input id="lock-input" type="password" inputmode="numeric" maxlength="12" placeholder="••••••"/>
    <p class="err" id="lock-err"></p>
    <button id="lock-btn">解鎖</button>
  </div>
</div>

<div id="app-content">
<div class="wrap">
  <h1>💰 存錢記錄</h1>
  <a class="nav-link" href="index.html">← 返回分期追蹤工具</a>

  <!-- 目標設定 -->
  <div class="section" id="goal-section">
    <h2>存錢目標</h2>
    <div id="goal-display"></div>
    <button id="btn-edit-goal" style="margin-top:12px;font-size:13px">✏️ 設定目標</button>
  </div>

  <!-- 統計卡片 -->
  <div class="grid" id="stats-grid" style="margin-bottom:18px"></div>

  <!-- 圖表 -->
  <div class="section" style="margin-bottom:18px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <h2 style="margin:0">存款趨勢</h2>
      <div style="display:flex;gap:6px">
        <button id="chart-bar" class="active" style="font-size:12px;padding:4px 10px">月存量</button>
        <button id="chart-line" style="font-size:12px;padding:4px 10px">累積總額</button>
      </div>
    </div>
    <canvas id="myChart"></canvas>
    <p style="font-size:12px;color:var(--text-muted);margin-top:8px;text-align:center" id="chart-empty">尚無資料可顯示</p>
  </div>

  <!-- Google 同步 -->
  <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
    <button id="btn-google-signin" style="flex:1;font-size:13px;min-width:120px">登入 Google</button>
    <button id="btn-google-upload" style="flex:1;font-size:13px;min-width:120px;display:none">同步到雲端</button>
    <button id="btn-google-download" style="flex:1;font-size:13px;min-width:120px;display:none">從雲端讀取</button>
  </div>
  <p id="google-status" style="font-size:12px;color:var(--text-muted);margin:0 0 16px">尚未登入 Google，目前資料僅存於此瀏覽器。</p>

  <!-- 存款記錄 -->
  <div class="section">
    <div class="topbar">
      <h2 style="margin:0">每月存款明細</h2>
      <button id="btn-add">＋ 新增記錄</button>
    </div>
    <div id="view-records"></div>
  </div>
</div>
</div>

<!-- 新增/編輯存款 Modal -->
<div class="modal-overlay" id="modal-wrap">
  <div class="modal">
    <h2 id="modal-title">新增存款記錄</h2>
    <div class="field">
      <label>月份 <span style="color:#c0392b">*</span></label>
      <input id="s-month" type="month" style="width:100%"/>
    </div>
    <div class="field">
      <label>存入金額 <span style="color:#c0392b">*</span></label>
      <input id="s-amount" type="number" min="0" step="1" placeholder="10000" style="width:100%"/>
    </div>
    <div class="field">
      <label>備註（選填）</label>
      <input id="s-note" placeholder="年終、獎金…" style="width:100%"/>
    </div>
    <div class="modal-actions">
      <button id="btn-cancel">取消</button>
      <button id="btn-save" style="font-weight:500">儲存</button>
    </div>
  </div>
</div>

<!-- 目標設定 Modal -->
<div class="modal-overlay" id="goal-modal-wrap">
  <div class="modal">
    <h2>設定存錢目標</h2>
    <div class="field">
      <label>目標名稱（選填）</label>
      <input id="g-name" placeholder="例如：買車頭期款" style="width:100%"/>
    </div>
    <div class="field">
      <label>目標金額 <span style="color:#c0392b">*</span></label>
      <input id="g-target" type="number" min="1" step="1" placeholder="500000" style="width:100%"/>
    </div>
    <div class="field">
      <label>目標達成日期（選填）</label>
      <input id="g-deadline" type="month" style="width:100%"/>
    </div>
    <div class="modal-actions">
      <button id="goal-cancel">取消</button>
      <button id="goal-save" style="font-weight:500">儲存</button>
    </div>
  </div>
</div>

<!-- 刪除確認 -->
<div class="confirm-overlay" id="confirm-wrap">
  <div class="confirm-box">
    <p>確定要刪除這筆存款記錄嗎？此動作無法復原。</p>
    <div class="row">
      <button id="confirm-cancel">取消</button>
      <button id="confirm-ok" class="danger">刪除</button>
    </div>
  </div>
</div>

<script>
(function(){
  var STORE_KEY = 'savings_records_v1';
  var GOAL_KEY  = 'savings_goal_v1';
  var records   = [];
  var goal      = null;
  var editingId = null;
  var pendingDeleteId = null;
  var chartMode = 'bar';
  var myChart   = null;

  function uid(){ return 's'+Date.now()+Math.floor(Math.random()*1000); }
  function fmtMoney(n){ return 'NT$'+Math.round(n).toLocaleString(); }
  function currentYM(){ var d=new Date(); return {y:d.getFullYear(), m:d.getMonth()+1}; }
  function fmtMonthLabel(str){ return str.replace('-','/').replace(/\/0(\d)/,'/$1'); }

  // ---- 儲存 ----
  function load(){
    try{ var r=localStorage.getItem(STORE_KEY); records=r?JSON.parse(r):[]; }catch(e){ records=[]; }
    try{ var g=localStorage.getItem(GOAL_KEY); goal=g?JSON.parse(g):null; }catch(e){ goal=null; }
    render();
  }
  function persist(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(records)); }catch(e){}
    try{ localStorage.setItem(GOAL_KEY, JSON.stringify(goal)); }catch(e){}
    if(typeof scheduleAutoSync==='function') scheduleAutoSync();
  }

  // ---- 排序 ----
  function sorted(){ return records.slice().sort(function(a,b){ return a.month<b.month?-1:(a.month>b.month?1:0); }); }

  // ---- 目標 Modal ----
  document.getElementById('btn-edit-goal').addEventListener('click', function(){
    document.getElementById('g-name').value   = goal&&goal.name   ? goal.name   : '';
    document.getElementById('g-target').value = goal&&goal.target ? goal.target : '';
    document.getElementById('g-deadline').value = goal&&goal.deadline ? goal.deadline : '';
    document.getElementById('goal-modal-wrap').classList.add('open');
  });
  document.getElementById('goal-cancel').addEventListener('click', function(){ document.getElementById('goal-modal-wrap').classList.remove('open'); });
  document.getElementById('goal-modal-wrap').addEventListener('click', function(e){ if(e.target.id==='goal-modal-wrap') this.classList.remove('open'); });
  document.getElementById('goal-save').addEventListener('click', function(){
    var t=parseFloat(document.getElementById('g-target').value);
    if(!t||t<=0||isNaN(t)){ alert('請填寫目標金額'); return; }
    goal = { name: document.getElementById('g-name').value.trim()||'存錢目標', target: t, deadline: document.getElementById('g-deadline').value||'' };
    persist(); render();
    document.getElementById('goal-modal-wrap').classList.remove('open');
  });

  // ---- 記錄 Modal ----
  function openModal(rec){
    editingId = rec ? rec.id : null;
    document.getElementById('modal-title').textContent = rec ? '編輯存款記錄' : '新增存款記錄';
    document.getElementById('s-month').value  = rec ? rec.month  : '';
    document.getElementById('s-amount').value = rec ? rec.amount : '';
    document.getElementById('s-note').value   = rec ? (rec.note||'') : '';
    document.getElementById('modal-wrap').classList.add('open');
  }
  function closeModal(){ document.getElementById('modal-wrap').classList.remove('open'); }
  document.getElementById('btn-add').addEventListener('click', function(){ openModal(null); });
  document.getElementById('btn-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-wrap').addEventListener('click', function(e){ if(e.target.id==='modal-wrap') closeModal(); });
  document.getElementById('btn-save').addEventListener('click', function(){
    var month  = document.getElementById('s-month').value;
    var amount = parseFloat(document.getElementById('s-amount').value);
    var note   = document.getElementById('s-note').value.trim();
    if(!month || isNaN(amount) || amount<0){ alert('請填寫月份與存入金額'); return; }
    var rec;
    if(editingId){
      rec = records.find(function(r){ return r.id===editingId; });
      rec.month=month; rec.amount=amount; rec.note=note;
    } else {
      rec = {id:uid(), month:month, amount:amount, note:note, created:Date.now()};
      records.push(rec);
    }
    persist(); closeModal(); render();
  });

  // ---- 刪除 ----
  document.getElementById('confirm-cancel').addEventListener('click', function(){ pendingDeleteId=null; document.getElementById('confirm-wrap').classList.remove('open'); });
  document.getElementById('confirm-wrap').addEventListener('click', function(e){ if(e.target.id==='confirm-wrap'){ pendingDeleteId=null; this.classList.remove('open'); } });
  document.getElementById('confirm-ok').addEventListener('click', function(){
    if(pendingDeleteId){ records=records.filter(function(r){ return r.id!==pendingDeleteId; }); persist(); render(); }
    pendingDeleteId=null; document.getElementById('confirm-wrap').classList.remove('open');
  });

  // ---- 渲染主流程 ----
  function render(){
    renderGoal();
    renderStats();
    renderChart();
    renderRecords();
  }

  // ---- 目標區塊 ----
  function renderGoal(){
    var el = document.getElementById('goal-display');
    if(!goal){
      el.innerHTML = '<p style="color:var(--text-muted);font-size:13px">尚未設定目標，點下方按鈕建立。</p>';
      return;
    }
    var total = sorted().reduce(function(s,r){ return s+r.amount; },0);
    var pct   = Math.min(100, goal.target>0 ? Math.round(total/goal.target*100) : 0);
    var remain= Math.max(goal.target-total, 0);
    var deadlineHint = '';
    if(goal.deadline){
      var cur=currentYM();
      var dp=goal.deadline.split('-');
      var dy=parseInt(dp[0]),dm=parseInt(dp[1]);
      var months=(dy-cur.y)*12+(dm-cur.m);
      if(months>0) deadlineHint = '　距截止 '+months+' 個月，需每月至少存 '+fmtMoney(Math.ceil(remain/months));
      else if(months===0) deadlineHint = '　本月截止！';
      else deadlineHint = '　已超過截止日';
    }
    el.innerHTML =
      '<p style="font-weight:500;margin-bottom:6px">'+escapeHtml(goal.name)+
        (goal.deadline?' <span style="font-size:12px;color:var(--text-muted)">目標 '+fmtMonthLabel(goal.deadline)+'</span>':'')+'</p>'+
      '<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-secondary);margin-bottom:4px">'+
        '<span>已存 <b>'+fmtMoney(total)+'</b> / '+fmtMoney(goal.target)+'</span>'+
        '<span>'+pct+'%</span>'+
      '</div>'+
      '<div class="progress-outer"><div class="progress-inner" style="width:'+pct+'%"></div></div>'+
      '<p style="font-size:12px;color:var(--text-muted);margin-top:4px">還差 <b style="color:var(--text-primary)">'+fmtMoney(remain)+'</b>'+deadlineHint+'</p>';
  }

  // ---- 統計卡片 ----
  function renderStats(){
    var list = sorted();
    var cur  = currentYM();
    var thisKey  = cur.y+'-'+String(cur.m).padStart(2,'0');
    var prevM    = cur.m===1?{y:cur.y-1,m:12}:{y:cur.y,m:cur.m-1};
    var prevKey  = prevM.y+'-'+String(prevM.m).padStart(2,'0');
    var yearStart= cur.y+'-01';

    var thisRec  = list.find(function(r){ return r.month===thisKey; });
    var prevRec  = list.find(function(r){ return r.month===prevKey; });
    var yearTotal= list.filter(function(r){ return r.month>=yearStart; }).reduce(function(s,r){ return s+r.amount; },0);
    var allTotal = list.reduce(function(s,r){ return s+r.amount; },0);
    var avg      = list.length ? Math.round(allTotal/list.length) : 0;

    function diffTag(a,b){
      if(a==null||b==null) return '';
      var d=a-b; if(d===0) return ' <span style="font-size:11px;color:var(--text-muted)">持平</span>';
      var sign=d>0?'↑':'↓'; var col=d>0?'var(--green)':'var(--red)';
      return ' <span style="font-size:11px;color:'+col+'">'+sign+fmtMoney(Math.abs(d))+'</span>';
    }
    var thisAmt = thisRec ? thisRec.amount : null;
    var prevAmt = prevRec ? prevRec.amount : null;
    var remain  = goal ? Math.max(goal.target-allTotal,0) : null;
    var pct     = goal && goal.target>0 ? Math.min(100,Math.round(allTotal/goal.target*100)) : null;

    document.getElementById('stats-grid').innerHTML =
      '<div class="card"><p class="lbl">本月存入</p><p class="val">'+(thisAmt!=null?fmtMoney(thisAmt):'—')+diffTag(thisAmt,prevAmt)+'</p><p class="sub">上月 '+(prevAmt!=null?fmtMoney(prevAmt):'無紀錄')+'</p></div>'+
      '<div class="card"><p class="lbl">今年累積（'+cur.y+'）</p><p class="val">'+fmtMoney(yearTotal)+'</p><p class="sub">共 '+list.filter(function(r){return r.month>=yearStart;}).length+' 個月</p></div>'+
      '<div class="card highlight"><p class="lbl">總存款</p><p class="val">'+fmtMoney(allTotal)+'</p><p class="sub">月均 '+fmtMoney(avg)+'</p></div>'+
      (remain!=null?'<div class="card '+(pct>=100?'green':'red')+'"><p class="lbl">離目標還差</p><p class="val">'+(pct>=100?'🎉 達標！':fmtMoney(remain))+'</p><p class="sub">完成度 '+pct+'%</p></div>':'');
  }

  // ---- 圖表 ----
  document.getElementById('chart-bar').addEventListener('click', function(){
    chartMode='bar';
    this.style.fontWeight='500'; document.getElementById('chart-line').style.fontWeight='400';
    renderChart();
  });
  document.getElementById('chart-line').addEventListener('click', function(){
    chartMode='line';
    this.style.fontWeight='500'; document.getElementById('chart-bar').style.fontWeight='400';
    renderChart();
  });

  function renderChart(){
    var list = sorted();
    var el = document.getElementById('chart-empty');
    var canvas = document.getElementById('myChart');
    if(list.length===0){ el.style.display='block'; canvas.style.display='none'; return; }
    el.style.display='none'; canvas.style.display='block';

    var labels = list.map(function(r){ return fmtMonthLabel(r.month); });
    var monthly = list.map(function(r){ return r.amount; });
    var cumul   = []; var acc=0;
    list.forEach(function(r){ acc+=r.amount; cumul.push(acc); });

    var isBar = chartMode==='bar';
    var data = isBar ? monthly : cumul;
    var color = isBar ? 'rgba(37,99,235,0.8)' : 'rgba(29,158,117,0.85)';
    var borderColor = isBar ? 'rgba(37,99,235,1)' : 'rgba(29,158,117,1)';

    if(myChart){ myChart.destroy(); }
    var ctx = canvas.getContext('2d');
    myChart = new Chart(ctx, {
      type: isBar ? 'bar' : 'line',
      data:{
        labels: labels,
        datasets:[{
          label: isBar ? '每月存入' : '累積總額',
          data: data,
          backgroundColor: color,
          borderColor: borderColor,
          borderWidth: isBar ? 0 : 2,
          fill: !isBar,
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: borderColor,
        }]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{
            callbacks:{
              label:function(ctx){ return ' '+fmtMoney(ctx.parsed.y); }
            }
          }
        },
        scales:{
          y:{
            ticks:{
              callback:function(v){ return v>=10000?(v/10000).toFixed(1)+'萬':v.toLocaleString(); }
            },
            grid:{ color:'rgba(0,0,0,0.06)' }
          },
          x:{ grid:{ display:false } }
        }
      }
    });

    // 目標線（累積圖才顯示）
    if(!isBar && goal && goal.target){
      myChart.options.plugins.annotation = {};
    }
  }

  // ---- 明細列表 ----
  function renderRecords(){
    var list = sorted().reverse();
    var el = document.getElementById('view-records');
    if(list.length===0){
      el.innerHTML='<p class="empty">尚未新增存款記錄，點右上角「新增記錄」開始。</p>';
      return;
    }
    var allTotal = sorted().reduce(function(s,r){ return s+r.amount; },0);
    var html = '<div style="overflow-x:auto"><table>'+
      '<tr><th>月份</th><th style="text-align:right">存入金額</th><th style="text-align:right">累積總額</th><th style="text-align:right">備註</th><th></th></tr>';
    var runningList = sorted();
    list.forEach(function(r){
      var idx = runningList.findIndex(function(x){ return x.id===r.id; });
      var cum = 0; for(var i=0;i<=idx;i++) cum += runningList[i].amount;
      html += '<tr>'+
        '<td style="font-weight:500">'+fmtMonthLabel(r.month)+'</td>'+
        '<td>'+fmtMoney(r.amount)+'</td>'+
        '<td style="color:var(--text-secondary)">'+fmtMoney(cum)+'</td>'+
        '<td style="color:var(--text-muted);font-size:12px">'+escapeHtml(r.note||'')+'</td>'+
        '<td style="text-align:right;white-space:nowrap">'+
          '<button class="act-btn" data-edit="'+r.id+'">編輯</button> '+
          '<button class="act-btn" data-del="'+r.id+'">刪除</button>'+
        '</td>'+
      '</tr>';
    });
    html += '</table></div>';
    el.innerHTML = html;
    el.querySelectorAll('[data-edit]').forEach(function(btn){
      btn.addEventListener('click',function(){ openModal(records.find(function(r){ return r.id===btn.getAttribute('data-edit'); })); });
    });
    el.querySelectorAll('[data-del]').forEach(function(btn){
      btn.addEventListener('click',function(){ pendingDeleteId=btn.getAttribute('data-del'); document.getElementById('confirm-wrap').classList.add('open'); });
    });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
  }

  // ---- Google Drive 同步 ----
  var GOOGLE_CLIENT_ID = '318579246047-ahdsc8epir18m3p42krh7tqddrrcbs64.apps.googleusercontent.com';
  var DRIVE_FILE_NAME  = 'tracker_data.json';
  var driveAccessToken = null;
  var driveFileId      = null;
  var tokenClient      = null;

  function setGoogleStatus(t){ document.getElementById('google-status').textContent=t; }
  function initGoogleAuth(){
    if(typeof google==='undefined'||!google.accounts){ setGoogleStatus('Google 登入元件載入失敗，請重新整理。'); return; }
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive.appdata',
      callback: function(resp){
        if(resp.error){ setGoogleStatus('登入失敗：'+resp.error); return; }
        driveAccessToken = resp.access_token;
        document.getElementById('btn-google-signin').textContent='已登入 Google';
        document.getElementById('btn-google-upload').style.display='block';
        document.getElementById('btn-google-download').style.display='block';
        setGoogleStatus('已登入，資料修改後會自動同步到雲端。');
        scheduleAutoSync();
      }
    });
  }
  document.getElementById('btn-google-signin').addEventListener('click',function(){
    if(!tokenClient) initGoogleAuth();
    if(tokenClient) tokenClient.requestAccessToken({prompt:driveAccessToken?'':'consent'});
  });
  function driveFetch(url,opt){
    opt=opt||{}; opt.headers=opt.headers||{}; opt.headers['Authorization']='Bearer '+driveAccessToken;
    return fetch(url,opt);
  }
  async function findDriveFile(){
    var res=await driveFetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q='+encodeURIComponent("name='"+DRIVE_FILE_NAME+"'")+'&fields=files(id,name)');
    var d=await res.json();
    if(d.files&&d.files.length){ driveFileId=d.files[0].id; return driveFileId; }
    return null;
  }
  async function fetchRemote(id){
    try{
      var res=await driveFetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media');
      if(!res.ok) return {};
      var d=await res.json();
      if(Array.isArray(d)) return {plans:d};
      return d;
    }catch(e){ return {}; }
  }
  async function uploadToDrive(silent){
    if(!driveAccessToken) return;
    if(!silent) setGoogleStatus('同步中…');
    try{
      var id=driveFileId||await findDriveFile();
      var remote=id?await fetchRemote(id):{};
      var payload=Object.assign({},remote,{savings:records, savingsGoal:goal});
      var meta={name:DRIVE_FILE_NAME,mimeType:'application/json'};
      if(!id) meta.parents=['appDataFolder'];
      var b='bnd_'+Date.now();
      var body='--'+b+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(meta)+'\r\n--'+b+'\r\nContent-Type: application/json\r\n\r\n'+JSON.stringify(payload)+'\r\n--'+b+'--';
      var url=id?'https://www.googleapis.com/upload/drive/v3/files/'+id+'?uploadType=multipart':'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
      var res=await driveFetch(url,{method:id?'PATCH':'POST',headers:{'Content-Type':'multipart/related; boundary='+b},body:body});
      if(!res.ok) throw new Error();
      var d=await res.json(); driveFileId=d.id;
      setGoogleStatus('已自動同步到雲端（'+new Date().toLocaleString('zh-TW')+'）');
    }catch(e){ setGoogleStatus('自動同步失敗，請稍後再試。'); }
  }
  var autoSyncTimer=null;
  function scheduleAutoSync(){
    if(!driveAccessToken) return;
    if(autoSyncTimer) clearTimeout(autoSyncTimer);
    autoSyncTimer=setTimeout(function(){ uploadToDrive(true); },800);
  }
  document.getElementById('btn-google-upload').addEventListener('click',async function(){ if(!driveAccessToken){ setGoogleStatus('請先登入 Google'); return; } await uploadToDrive(false); });
  document.getElementById('btn-google-download').addEventListener('click',async function(){
    if(!driveAccessToken){ setGoogleStatus('請先登入 Google'); return; }
    setGoogleStatus('讀取中…');
    try{
      var id=driveFileId||await findDriveFile();
      if(!id){ setGoogleStatus('雲端尚無備份，請先同步一次。'); return; }
      var remote=await fetchRemote(id);
      if((records.length>0||goal)&&!confirm('從雲端讀取將會取代目前的存錢資料，確定繼續嗎？')) return;
      if(Array.isArray(remote.savings)) records=remote.savings;
      if(remote.savingsGoal) goal=remote.savingsGoal;
      persist(); render();
      setGoogleStatus('已從雲端讀取最新資料。');
    }catch(e){ setGoogleStatus('讀取失敗，請再試一次。'); }
  });
  window.addEventListener('load',function(){ setTimeout(initGoogleAuth,300); });

  load();
})();
